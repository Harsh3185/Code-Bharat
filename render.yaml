services:
  - type: web
    name: code-bharat-frontend
    runtime: static
    plan: free
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: Frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: code-bharat-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_COMPILER_URL
        fromService:
          type: web
          name: code-bharat-compiler
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: code-bharat-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: code-bharat-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: COMPILER_SERVICE_URL
        fromService:
          type: web
          name: code-bharat-compiler
          property: hostport
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false

  - type: web
    name: code-bharat-compiler
    runtime: node
    plan: free
    region: singapore
    rootDir: Compiler
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
